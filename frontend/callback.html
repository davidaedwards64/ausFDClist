<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in… — Australian FDC AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --banner-bg:   #2D486C;
      --accent:      #4B79B4;
      --accent-dark: #2D486C;
      --bg:          #edf0f5;
      --surface:     #ffffff;
      --border:      #c2c9d6;
      --text:        #1a2233;
      --muted:       #5e6e85;
      --radius:      10px;
      --shadow:      0 2px 10px rgba(45,72,108,.13);
    }
    html, body {
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .site-header {
      background: var(--banner-bg);
      border-bottom: 3px solid #1a2f45;
      padding: 13px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      text-align: center;
    }
    .site-header h1 {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 1.55rem;
      font-weight: normal;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(0,0,0,.45);
    }
    .site-header .subtitle {
      font-size: .8rem;
      color: #b4c0cc;
      margin-top: 2px;
    }
    .callback-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 90px);
      padding: 24px 16px;
    }
    .callback-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--accent-dark);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .callback-card h2 {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 1.2rem;
      font-weight: normal;
      color: var(--accent-dark);
      margin-bottom: 6px;
    }
    .callback-card p {
      font-size: .88rem;
      color: var(--muted);
    }
    .error-state { display: none; }
    .error-state .icon { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .error-state h2 { color: #991b1b; }
    .error-state p  { color: var(--text); margin-bottom: 18px; }
    .error-msg-detail {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #991b1b;
      font-size: .82rem;
      padding: 8px 12px;
      margin-bottom: 18px;
      word-break: break-word;
    }
    .back-link {
      display: inline-block;
      background: var(--accent-dark);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      padding: 10px 22px;
      font-size: .92rem;
      transition: background .15s;
    }
    .back-link:hover { background: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <header class="site-header">
    <h1><span style="vertical-align:middle;margin-right:4px;">🇦🇺</span> Australian FDC Illustrated Guide</h1>
    <p class="subtitle">AI-powered collection assistant &mdash; First Day Covers 1940&ndash;present</p>
  </header>

  <div class="callback-wrap">
    <div class="callback-card">

      <!-- Loading state -->
      <div id="loading-state">
        <div class="spinner"></div>
        <h2>Signing you in…</h2>
        <p>Please wait while we complete authentication.</p>
      </div>

      <!-- Error state (hidden initially) -->
      <div class="error-state" id="error-state">
        <span class="icon">⚠️</span>
        <h2>Sign-in failed</h2>
        <p>An error occurred during authentication.</p>
        <div class="error-msg-detail" id="error-detail"></div>
        <a href="/auth/signin" class="back-link">Back to sign in</a>
      </div>

    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    (function () {
      window.Auth.handleCallback()
        .then(() => {
          window.location.replace('/');
        })
        .catch(err => {
          document.getElementById('loading-state').style.display = 'none';
          const errorState = document.getElementById('error-state');
          errorState.style.display = 'block';
          document.getElementById('error-detail').textContent = err.message;
        });
    })();
  </script>
</body>
</html>
