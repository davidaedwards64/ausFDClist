<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Australian FDC AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --banner-bg:   #2D486C;
      --accent:      #4B79B4;
      --accent-dark: #2D486C;
      --bg:          #edf0f5;
      --surface:     #ffffff;
      --border:      #c2c9d6;
      --text:        #1a2233;
      --muted:       #5e6e85;
      --radius:      10px;
      --shadow:      0 2px 10px rgba(45,72,108,.13);
    }
    html, body {
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .site-header {
      background: var(--banner-bg);
      border-bottom: 3px solid #1a2f45;
      padding: 13px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      text-align: center;
    }
    .site-header h1 {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 1.55rem;
      font-weight: normal;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(0,0,0,.45);
    }
    .site-header .subtitle {
      font-size: .8rem;
      color: #b4c0cc;
      margin-top: 2px;
    }
    .signin-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 90px);
      padding: 24px 16px;
    }
    .signin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .signin-card .flag { font-size: 2.4rem; display: block; margin-bottom: 12px; }
    .signin-card h2 {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: 1.3rem;
      font-weight: normal;
      color: var(--accent-dark);
      margin-bottom: 6px;
    }
    .signin-card p {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .okta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background .15s;
    }
    .okta-btn:hover { background: var(--accent); }
    .okta-btn:disabled { opacity: .55; cursor: default; }
    .okta-btn svg { flex-shrink: 0; }
    .error-msg {
      margin-top: 18px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      color: #991b1b;
      font-size: .84rem;
      padding: 10px 14px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1><span style="vertical-align:middle;margin-right:4px;">🇦🇺</span> Australian FDC Illustrated Guide</h1>
    <p class="subtitle">AI-powered collection assistant &mdash; First Day Covers 1940&ndash;present</p>
  </header>

  <div class="signin-wrap">
    <div class="signin-card">
      <span class="flag">🔐</span>
      <h2>Sign in to continue</h2>
      <p>Access is restricted to authorised users via Okta single sign-on.</p>
      <button class="okta-btn" id="signin-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/>
        </svg>
        Sign in with Okta
      </button>
      <div class="error-msg" id="error-msg" hidden></div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    (function () {
      // Show error from query param (e.g. redirect from failed callback)
      const params = new URLSearchParams(window.location.search);
      const errorParam = params.get('error');
      if (errorParam) {
        const msg = document.getElementById('error-msg');
        msg.textContent = decodeURIComponent(errorParam);
        msg.hidden = false;
      }

      document.getElementById('signin-btn').addEventListener('click', async function () {
        this.disabled = true;
        this.textContent = 'Redirecting…';
        try {
          await window.Auth.initiateLogin();
        } catch (err) {
          const msg = document.getElementById('error-msg');
          msg.textContent = `Sign-in error: ${err.message}`;
          msg.hidden = false;
          this.disabled = false;
          this.textContent = 'Sign in with Okta';
        }
      });
    })();
  </script>
</body>
</html>
