services:
  - type: web
    name: ausfdc-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in the Render dashboard — never commit this value
      - key: PHP_API_BASE_URL
        value: https://davidaedwards.com/ausfdclist
