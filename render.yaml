services:
  - type: web
    name: ausfdc-agent
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in the Render dashboard — never commit this value
      - key: PHP_API_BASE_URL
        value: https://davidaedwards.com/ausfdclist
      - key: OKTA_CLIENT_ID
        sync: false
      - key: OKTA_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OKTA_ISSUER
        sync: false
      - key: OKTA_DOMAIN
        sync: false
      - key: OKTA_REDIRECT_URI
        value: https://your-render-url.onrender.com/auth/callback
      - key: OKTA_AGENT_CLIENT_ID
        sync: false
      - key: OKTA_AGENT_PRIVATE_JWK
        sync: false
      - key: OKTA_DB_RESOURCE_INDICATOR
        sync: false
